name: ZAP Security Scanning
on:
  workflow_call:

jobs:
  zap-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

      - name: Build JAR
        run: ./gradlew build -x test --no-daemon
        
      - name: Verify JAR exists
        run: |
          echo "Checking for JAR files..."
          find . -name "*.jar" -type f
          if [ ! -f "build/libs/laa-civil-manage-api-0.0.1-SNAPSHOT.jar" ]; then
            echo "JAR not found! Build may have failed."
            exit 1
          fi

      - name: Create tmp directory for ZAP reports
        run: |
          mkdir -p tmp
          chmod 777 tmp

      - name: Run Zap Security Scan against Civil Manage
        run: |
          ./deploy/scripts/zap/zap-run-cicd.sh 
          
      - name: Upload ZAP HTML Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-scan-report-html
          path: tmp/zap-baseline-report.html