spring:
  application:
    name: laa-civil-manage-api

management:
  endpoints:
    web:
      base-path: "/"
      path-mapping:
        prometheus: "metrics"
        health: "actuator/health"
      exposure:
        include: "health,info,prometheus"

data-access-api:
  base-url: https://laa-data-access-api-staging.cloud-platform.service.justice.gov.uk
