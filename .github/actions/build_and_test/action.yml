name: 'Build, Test, and Publish Gradle Project'
description: 'Checks out the code, sets up JDK 25 and Gradle, then builds and publishes.'

inputs:
  github_token:
    description: 'GitHub Token required for Gradle build and publish steps'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

    - name: Set up JDK 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: 25
        distribution: 'corretto'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

    - name: Build and test
      shell: bash
      run: ./gradlew build
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
    
    - name: Verify that OpenAPI schema is up to date
      shell: bash
      run: ./gradlew verifyOpenApiSync
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    # - name: Publish package
    #   shell: bash
    #   run: ./gradlew publish
    #   env:
    #     GITHUB_TOKEN: ${{ inputs.github_token }}