name: "Deploy"
description: "Deploy docker image to namespace"
inputs:
  auth_directory_url:
    description: "Entra Authority URL"
  auth_client_id:
    description: "Entra Application ID"
  auth_client_secret:
    description: "Entra Application Secret"
  auth_redirect_url:
    description: "Redirect URL back to the application"
  kube-cert:
    description: "Kubernetes cluster authentication certificate"
    required: true
  kube-token:
    description: "Kubernetes cluster authentication token"
    required: true
  kube-cluster:
    description: "Kubernetes cluster name"
    required: true
  kube-namespace:
    description: "Kubernetes cluster namespace"
    required: true
  app-environment:
    description: "environment to which the app is being deployed [staging, production, etc]"
    required: true
  ecr-repository:
    description: "ECR repository"
    required: true
  ecr-registry_url:
    description: "ECR registry url"
    required: true
  session_secret:
    description: "Session secret"
  service_name:
    description: "Service name"
  session_name:
    description: "Session name"
  ratelimit_max:
    description: "Rate limit max"
  ratewindow_ms:
    description: "Rate limit max"
runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v6.0.2

    - name: Authenticate to the cluster
      uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@1c0493f175be571fe92df74e78aa03ca1858811f
      with:
        kube-cert: ${{ inputs.kube-cert }}
        kube-token: ${{ inputs.kube-token }}
        kube-cluster: ${{ inputs.kube-cluster }}
        kube-namespace: ${{ inputs.kube-namespace }}

    # - name: Deploy infrastructure to UAT
    #   shell: bash
    #   run: |
    #     if [ ${{ inputs.app-environment }} == 'uat' ]
    #     then
    #       echo "DEPLOYING"
    #       kubectl apply --record=false -f ./deploy/infrastructure/grafana/
    #     fi

    - name: Deploy using Helm
      shell: bash
      run: ./deploy/scripts/deploy.sh ${{ inputs.app-environment }}
      env:
        REGISTRY: ${{ inputs.ecr-registry_url }}
        REPOSITORY: ${{ inputs.ecr-repository }}
        IMAGE_TAG: ${{ github.sha }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        K8S_NAMESPACE: ${{ inputs.kube-namespace }}
        # NODE_ENV: production
        # AUTH_CLIENT_ID: ${{ inputs.auth_client_id }}
        # AUTH_CLIENT_SECRET: ${{ inputs.auth_client_secret }}
        # AUTH_DIRECTORY_URL: ${{ inputs.auth_directory_url }}
        # AUTH_REDIRECT_URL: ${{ inputs.auth_redirect_url }}
        # RATE_LIMIT_MAX: ${{ inputs.ratelimit_max || '100' }}
        # RATE_WINDOW_MS: ${{ inputs.ratewindow_ms || '900000' }}
        # SERVICE_NAME: ${{ inputs.service_name || 'LAA Civil Manage Example' }}
        # SESSION_SECRET: ${{ inputs.session_secret }}
        # SESSION_NAME: ${{ inputs.session_name || 'sessionIdExample' }}
